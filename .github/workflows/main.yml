name: Android Build (Debug)

on:
  push:
    branches:
      - '**'
  workflow_dispatch: {}

env:
  ANDROID_SDK_ROOT: ${{ github.workspace }}/Android/Sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Android SDK command-line tools and packages
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y unzip curl
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -sSL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools-temp
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools-temp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Verify gradlew exists and make it executable
        run: |
          if [ ! -f ./gradlew ]; then
            echo "ERROR: gradlew file not found in repository root!"
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --build-cache

      - name: List produced APKs (for debugging)
        run: |
          echo "Looking for APKs..."
          find . -type f -name "*-debug.apk" -ls

      - name: Upload debug APK(s)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/outputs/apk/debug/
          retention-days: 7

      - name: Build failure notification
        if: failure()
        run: |
          echo "Build failed! Check the logs above for details."
          exit 1
