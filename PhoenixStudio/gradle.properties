# Phoenix Studio — Gradle properties.

# JVM heap sized conservatively so the build stays fast on GitHub Actions'
# standard 2-core/7GB runners without wasting startup time on a huge heap.
org.gradle.jvmargs=-Xmx2560m -Dfile.encoding=UTF-8

# Parallel + caching: fewer CI minutes burned per run.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
